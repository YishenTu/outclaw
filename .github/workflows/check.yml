name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run check:boundaries
      - run: bun test --coverage 2>&1 | tee coverage.txt
      - run: bun run scripts/check-coverage.ts < coverage.txt
